<text font-weight="bold" font-size="10" fill="#8b949e" y="623" x="40">FIXED PRIMITIVES (all medicinal plants):</text>
<text font-size="9" fill="#8b949e" y="638" x="40">D = 𐑼 (infinite-dim) · T = 𐑸 (self-referential) · R = 𐑾 (bidirectional) · P = 𐑬 (partial) · F = 𐑱 (classical)</text>
<text font-style="italic" font-size="8" fill="#484f58" y="653" x="40">These five are invariant across the entire pharmacopoeia — only Ç, Γ, φ̂, Ħ, Σ, Ω, ɢ discriminate</text>


