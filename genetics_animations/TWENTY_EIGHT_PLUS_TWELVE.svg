<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <defs>
    <style>
      .title { font-family: serif; font-size: 22px; text-anchor: middle; font-weight: bold; fill: #222; }
      .caption { font-family: sans-serif; font-size: 13px; text-anchor: middle; fill: #666; }
      .aa-label { font-family: monospace; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .prim-label { font-family: sans-serif; font-size: 11px; text-anchor: middle; fill: #555; }
      @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes glowGreen { 0%,100% { fill: #d4edda; } 50% { fill: #b8e6c5; } }
      @keyframes glowGold { 0%,100% { fill: #fff3cd; } 50% { fill: #ffe28a; } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
  </defs>

  <text x="450" y="35" class="title">The 20 Amino Acids: 8 Ground + 12 Promoted</text>
  <text x="450" y="60" class="caption">Ground-layer AAs carry no primitive activation. 12 promoted AAs biject onto the 12 IG primitives.</text>

  <!-- Ground layer: 8 AAs -->
  <text x="180" y="95" class="title" style="font-size: 18px; fill: #28a745;">Ground Layer (8 AAs)</text>
  <text x="180" y="115" class="caption">No primitive activation — kernel runs in base mode</text>

  <!-- Ground AA boxes -->
  <g style="animation: fadeIn 1s 0.5s forwards; opacity: 0;">
    <rect x="30" y="135" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="80" y="162" class="aa-label" fill="#155724">Leu</text>
    <text x="80" y="178" class="prim-label">(UUA, UUG, CU_ box)</text>
  </g>
  <g style="animation: fadeIn 1s 0.7s forwards; opacity: 0;">
    <rect x="145" y="135" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="195" y="162" class="aa-label" fill="#155724">Pro</text>
    <text x="195" y="178" class="prim-label">(CC_ box)</text>
  </g>
  <g style="animation: fadeIn 1s 0.9s forwards; opacity: 0;">
    <rect x="260" y="135" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="310" y="162" class="aa-label" fill="#155724">Arg</text>
    <text x="310" y="178" class="prim-label">(CG_ box, AGA/AGG)</text>
  </g>
  <g style="animation: fadeIn 1s 1.1s forwards; opacity: 0;">
    <rect x="30" y="195" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="80" y="222" class="aa-label" fill="#155724">Thr</text>
    <text x="80" y="238" class="prim-label">(AC_ box)</text>
  </g>
  <g style="animation: fadeIn 1s 1.3s forwards; opacity: 0;">
    <rect x="145" y="195" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="195" y="222" class="aa-label" fill="#155724">Ala</text>
    <text x="195" y="238" class="prim-label">(GC_ box)</text>
  </g>
  <g style="animation: fadeIn 1s 1.5s forwards; opacity: 0;">
    <rect x="260" y="195" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="310" y="222" class="aa-label" fill="#155724">Ser</text>
    <text x="310" y="238" class="prim-label">(UC_, AGU, AGC)</text>
  </g>
  <g style="animation: fadeIn 1s 1.7s forwards; opacity: 0;">
    <rect x="30" y="255" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="80" y="282" class="aa-label" fill="#155724">Val</text>
    <text x="80" y="298" class="prim-label">(GU_ box)</text>
  </g>
  <g style="animation: fadeIn 1s 1.9s forwards; opacity: 0;">
    <rect x="145" y="255" width="100" height="45" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
    <text x="195" y="282" class="aa-label" fill="#155724">Gly</text>
    <text x="195" y="298" class="prim-label">(GG_ box)</text>
  </g>

  <!-- Arrow -->
  <text x="440" y="245" class="title" style="font-size: 30px; fill: #888; animation: fadeIn 1s 2s forwards; opacity: 0;">+</text>

  <!-- Promoted layer: 12 AAs -->
  <text x="720" y="95" class="title" style="font-size: 18px; fill: #d4ac0d;">Promoted Layer (12 AAs)</text>
  <text x="720" y="115" class="caption">Each activates exactly one IG primitive</text>

  <!-- Promoted AA boxes with IG primitive labels -->
  <g style="animation: fadeIn 1s 0.5s forwards; opacity: 0;">
    <rect x="470" y="135" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="525" y="162" class="aa-label" fill="#856404">Met</text>
    <text x="525" y="178" class="prim-label" style="fill: #e67e22;">&#208; (Dimensionality)</text>
  </g>
  <g style="animation: fadeIn 1s 0.7s forwards; opacity: 0;">
    <rect x="595" y="135" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="650" y="162" class="aa-label" fill="#856404">Trp</text>
    <text x="650" y="178" class="prim-label" style="fill: #e67e22;">&#254; (Topology)</text>
  </g>
  <g style="animation: fadeIn 1s 0.9s forwards; opacity: 0;">
    <rect x="720" y="135" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="775" y="162" class="aa-label" fill="#856404">Cys</text>
    <text x="775" y="178" class="prim-label" style="fill: #e67e22;">&#344; (Recognition)</text>
  </g>
  <g style="animation: fadeIn 1s 1.1s forwards; opacity: 0;">
    <rect x="470" y="195" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="525" y="222" class="aa-label" fill="#856404">Tyr</text>
    <text x="525" y="238" class="prim-label" style="fill: #e67e22;">&#934; (Parity)</text>
  </g>
  <g style="animation: fadeIn 1s 1.3s forwards; opacity: 0;">
    <rect x="595" y="195" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="650" y="222" class="aa-label" fill="#856404">Phe</text>
    <text x="650" y="238" class="prim-label" style="fill: #e67e22;">&#402; (Fidelity)</text>
  </g>
  <g style="animation: fadeIn 1s 1.5s forwards; opacity: 0;">
    <rect x="720" y="195" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="775" y="222" class="aa-label" fill="#856404">Ile</text>
    <text x="775" y="238" class="prim-label" style="fill: #e67e22;">&#199; (Kinetics)</text>
  </g>
  <g style="animation: fadeIn 1s 1.7s forwards; opacity: 0;">
    <rect x="470" y="255" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="525" y="282" class="aa-label" fill="#856404">His</text>
    <text x="525" y="298" class="prim-label" style="fill: #e67e22;">&#915; (Granularity)</text>
  </g>
  <g style="animation: fadeIn 1s 1.9s forwards; opacity: 0;">
    <rect x="595" y="255" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="650" y="282" class="aa-label" fill="#856404">Asn</text>
    <text x="650" y="298" class="prim-label" style="fill: #e67e22;">&#610; (Coupling)</text>
  </g>
  <g style="animation: fadeIn 1s 2.1s forwards; opacity: 0;">
    <rect x="720" y="255" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="775" y="282" class="aa-label" fill="#856404">Gln</text>
    <text x="775" y="298" class="prim-label" style="fill: #e67e22;">&#8857; (Criticality)</text>
  </g>
  <g style="animation: fadeIn 1s 2.3s forwards; opacity: 0;">
    <rect x="470" y="315" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="525" y="342" class="aa-label" fill="#856404">Asp</text>
    <text x="525" y="358" class="prim-label" style="fill: #e67e22;">&#358; (Chirality)</text>
  </g>
  <g style="animation: fadeIn 1s 2.5s forwards; opacity: 0;">
    <rect x="595" y="315" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="650" y="342" class="aa-label" fill="#856404">Lys</text>
    <text x="650" y="358" class="prim-label" style="fill: #e67e22;">&#931; (Stoichiometry)</text>
  </g>
  <g style="animation: fadeIn 1s 2.7s forwards; opacity: 0;">
    <rect x="720" y="315" width="110" height="45" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="775" y="342" class="aa-label" fill="#856404">Glu</text>
    <text x="775" y="358" class="prim-label" style="fill: #e67e22;">&#937; (Winding)</text>
  </g>

  <!-- Equals sign -->
  <text x="450" y="380" class="title" style="font-size: 30px; fill: #888; animation: fadeIn 1s 3s forwards; opacity: 0;">= 20 Amino Acids</text>

  <!-- Risk analysis -->
  <rect x="50" y="400" width="800" height="80" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1" style="animation: fadeIn 1s 3.5s forwards; opacity: 0;"/>
  <text x="450" y="425" class="title" style="font-size: 16px;">Primitive Activation Risk</text>
  <text x="180" y="450" class="caption" style="fill: #e74c3c;">&#9632; Critical (&#208;, &#358;, &#937;): Met, Asp, Glu</text>
  <text x="180" y="468" class="caption" style="fill: #e67e22;">&#9632; High (&#344;, &#8857;): Cys, Gln</text>
  <text x="480" y="450" class="caption" style="fill: #f39c12;">&#9632; Moderate: Trp, Tyr, Ile, His, Asn</text>
  <text x="480" y="468" class="caption" style="fill: #28a745;">&#9632; Low (&#402;, &#931;): Phe, Lys</text>

  <!-- Bottom: equation -->
  <text x="450" y="510" class="theorem" style="font-size: 18px; font-weight: bold; fill: #333; animation: fadeIn 1s 4s forwards; opacity: 0;">
    8 + 12 = 20 Amino Acids = 16 × 4 / 3.2 = 64 / 3.2
  </text>
  <text x="450" y="535" class="caption" style="animation: fadeIn 1s 4.5s forwards; opacity: 0;">
    Ground-layer AAs come in 8 exact boxes (32 codons). Promoted AAs occupy split boxes (29 codons) + 3 stops.
  </text>
  <text x="450" y="555" class="caption" style="animation: fadeIn 1s 5s forwards; opacity: 0;">
    The bijection is structural: 12 IG primitives ↔ 12 promoted AAs, ordered by primitive risk class.
  </text>
</svg>