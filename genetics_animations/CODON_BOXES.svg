<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750">
  <defs>
    <style>
      .title { font-family: serif; font-size: 22px; text-anchor: middle; font-weight: bold; fill: #222; }
      .caption { font-family: sans-serif; font-size: 13px; text-anchor: middle; fill: #666; }
      .box { stroke-width: 2; }
      .box-label { font-family: monospace; font-size: 14px; font-weight: bold; text-anchor: middle; fill: #333; }
      .box-count { font-family: sans-serif; font-size: 11px; text-anchor: middle; fill: #555; }
      .legend-text { font-family: sans-serif; font-size: 13px; fill: #444; }
      @keyframes exactGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes splitGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
      @keyframes stopGlow { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes slideIn { 0% { transform: translateY(-20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    </style>
  </defs>

  <text x="450" y="35" class="title">Codon Box Stratification</text>
  <text x="450" y="60" class="caption">16 boxes partitioned by B₄ Frobenius rule: exact stratum (32 codons) vs split stratum (29+3 stop)</text>

  <!-- Grid of 16 boxes: 4 rows (p1: A, U, C, G) x 4 cols (p2: A, U, C, G) -->
  <!-- Row labels -->
  <text x="50" y="175" class="box-label">A</text>
  <text x="50" y="305" class="box-label">U</text>
  <text x="50" y="435" class="box-label">C</text>
  <text x="50" y="565" class="box-label">G</text>
  <text x="45" y="135" class="caption" style="font-style: italic;">p1</text>

  <!-- Col labels -->
  <text x="160" y="115" class="box-label">A</text>
  <text x="315" y="115" class="box-label">U</text>
  <text x="470" y="115" class="box-label">C</text>
  <text x="625" y="115" class="box-label">G</text>
  <text x="400" y="105" class="caption" style="font-style: italic;">p2</text>

  <!-- Box definitions: (x, y, w, h, fill, stroke, label, exact_bool) -->

  <rect x="90" y="135" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.0s" repeatCount="indefinite"/>
  </rect>
  <text x="155" y="155" class="box-label" font-size="13">AA_</text>
  <text x="155" y="177" class="box-count" font-size="10">AAA AAU AAC AAG</text>
  <text x="155" y="200" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="235" y="135" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.1s" repeatCount="indefinite"/>
  </rect>
  <text x="300" y="155" class="box-label" font-size="13">AU_</text>
  <text x="300" y="177" class="box-count" font-size="10">AUA AUU AUC AUG</text>
  <text x="300" y="200" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="380" y="135" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </rect>
  <text x="445" y="155" class="box-label" font-size="13">AC_</text>
  <text x="445" y="177" class="box-count" font-size="10">ACA ACU ACC ACG</text>
  <text x="445" y="200" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="525" y="135" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.30000000000000004s" repeatCount="indefinite"/>
  </rect>
  <text x="590" y="155" class="box-label" font-size="13">AG_</text>
  <text x="590" y="177" class="box-count" font-size="10">AGA AGU AGC AGG</text>
  <text x="590" y="200" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="90" y="260" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <text x="155" y="280" class="box-label" font-size="13">UA_</text>
  <text x="155" y="302" class="box-count" font-size="10"><tspan fill="#dc3545" font-weight="bold">UAA</tspan> UAU UAC <tspan fill="#dc3545" font-weight="bold">UAG</tspan></text>
  <text x="155" y="325" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="235" y="260" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="300" y="280" class="box-label" font-size="13">UU_</text>
  <text x="300" y="302" class="box-count" font-size="10">UUA UUU UUC UUG</text>
  <text x="300" y="325" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="380" y="260" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.6000000000000001s" repeatCount="indefinite"/>
  </rect>
  <text x="445" y="280" class="box-label" font-size="13">UC_</text>
  <text x="445" y="302" class="box-count" font-size="10">UCA UCU UCC UCG</text>
  <text x="445" y="325" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="525" y="260" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.7000000000000001s" repeatCount="indefinite"/>
  </rect>
  <text x="590" y="280" class="box-label" font-size="13">UG_</text>
  <text x="590" y="302" class="box-count" font-size="10"><tspan fill="#dc3545" font-weight="bold">UGA</tspan> UGU UGC UGG</text>
  <text x="590" y="325" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="90" y="385" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <text x="155" y="405" class="box-label" font-size="13">CA_</text>
  <text x="155" y="427" class="box-count" font-size="10">CAA CAU CAC CAG</text>
  <text x="155" y="450" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="235" y="385" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  <text x="300" y="405" class="box-label" font-size="13">CU_</text>
  <text x="300" y="427" class="box-count" font-size="10">CUA CUU CUC CUG</text>
  <text x="300" y="450" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="380" y="385" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.0s" repeatCount="indefinite"/>
  </rect>
  <text x="445" y="405" class="box-label" font-size="13">CC_</text>
  <text x="445" y="427" class="box-count" font-size="10">CCA CCU CCC CCG</text>
  <text x="445" y="450" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="525" y="385" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.1s" repeatCount="indefinite"/>
  </rect>
  <text x="590" y="405" class="box-label" font-size="13">CG_</text>
  <text x="590" y="427" class="box-count" font-size="10">CGA CGU CGC CGG</text>
  <text x="590" y="450" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="90" y="510" width="130" height="110" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.2000000000000002s" repeatCount="indefinite"/>
  </rect>
  <text x="155" y="530" class="box-label" font-size="13">GA_</text>
  <text x="155" y="552" class="box-count" font-size="10">GAA GAU GAC GAG</text>
  <text x="155" y="575" class="box-count" font-size="10" fill="#888">ℤ₂ wobble</text>
  <rect x="235" y="510" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.3s" repeatCount="indefinite"/>
  </rect>
  <text x="300" y="530" class="box-label" font-size="13">GU_</text>
  <text x="300" y="552" class="box-count" font-size="10">GUA GUU GUC GUG</text>
  <text x="300" y="575" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="380" y="510" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.4000000000000001s" repeatCount="indefinite"/>
  </rect>
  <text x="445" y="530" class="box-label" font-size="13">GC_</text>
  <text x="445" y="552" class="box-count" font-size="10">GCA GCU GCC GCG</text>
  <text x="445" y="575" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="525" y="510" width="130" height="110" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="2" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.7;0.95" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="590" y="530" class="box-label" font-size="13">GG_</text>
  <text x="590" y="552" class="box-count" font-size="10">GGA GGU GGC GGG</text>
  <text x="590" y="575" class="box-count" font-size="10" fill="#888">μ∘δ=id</text>
  <rect x="150" y="680" width="600" height="55" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <rect x="170" y="693" width="20" height="20" rx="3" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="200" y="709" class="legend-text">Exact stratum (8 boxes, 32 codons): μ∘δ=id holds exactly — p3 carries no information</text>
  <rect x="170" y="717" width="20" height="20" rx="3" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="200" y="733" class="legend-text">Split stratum (8 boxes, 29 codons + 3 stops): μ∘δ=id modulo ℤ₂ wobble — p3 must discriminate pyrimidine/purine</text>
</svg>