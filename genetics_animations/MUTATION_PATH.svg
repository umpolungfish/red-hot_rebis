<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <style>
      .title { font-family: serif; font-size: 22px; text-anchor: middle; font-weight: bold; fill: #222; }
      .caption { font-family: sans-serif; font-size: 13px; text-anchor: middle; fill: #666; }
      .node-label { font-family: monospace; font-size: 15px; font-weight: bold; text-anchor: middle; }
      .aa-label { font-family: sans-serif; font-size: 12px; text-anchor: middle; fill: #555; }
      .cost-label { font-family: monospace; font-size: 11px; text-anchor: middle; fill: #888; }
      .path-label { font-family: serif; font-size: 11px; font-style: italic; text-anchor: middle; fill: #666; }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes pathDraw { 0% { stroke-dashoffset: 500; } 100% { stroke-dashoffset: 0; } }
      @keyframes nodePulse { 0%,100% { r: 22; } 50% { r: 26; } }
    </style>
  </defs>

  <text x="450" y="35" class="title">B&#8324; Lattice Mutation Paths</text>
  <text x="450" y="60" class="caption">Amino acid substitutions as B&#8324; lattice edit distances — from single-nucleotide to cross-stratum</text>

  <!-- Nucleotide B4 lattice in center -->
  <text x="450" y="95" class="title" style="font-size: 16px;">B&#8324; Nucleotide Edit Costs</text>

  <!-- B4 lattice: G at top -->
  <circle cx="450" cy="130" r="22" fill="#e74c3c" stroke="#c0392b" stroke-width="2">
    <animate attributeName="r" values="22;26;22" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="135" class="node-label" fill="white">G</text>

  <!-- C and U in middle -->
  <circle cx="340" cy="200" r="22" fill="#2980b9" stroke="#2471a3" stroke-width="2">
    <animate attributeName="r" values="22;26;22" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <text x="340" y="205" class="node-label" fill="white">C</text>

  <circle cx="560" cy="200" r="22" fill="#8e44ad" stroke="#7d3c98" stroke-width="2">
    <animate attributeName="r" values="22;26;22" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <text x="560" y="205" class="node-label" fill="white">U</text>

  <!-- A at bottom -->
  <circle cx="450" cy="270" r="22" fill="#27ae60" stroke="#1e8449" stroke-width="2">
    <animate attributeName="r" values="22;26;22" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="275" class="node-label" fill="white">A</text>

  <!-- Edges with costs -->
  <line x1="435" y1="148" x2="352" y2="185" stroke="#888" stroke-width="2" style="stroke-dasharray: 200; animation: pathDraw 1s 0.2s forwards; stroke-dashoffset: 200;"/>
  <text x="370" y="168" class="cost-label" fill="#e74c3c">cost=1</text>

  <line x1="465" y1="148" x2="548" y2="185" stroke="#888" stroke-width="2" style="stroke-dasharray: 200; animation: pathDraw 1s 0.4s forwards; stroke-dashoffset: 200;"/>
  <text x="525" y="168" class="cost-label" fill="#e74c3c">cost=1</text>

  <line x1="330" y1="218" x2="440" y2="258" stroke="#888" stroke-width="2" style="stroke-dasharray: 200; animation: pathDraw 1s 0.6s forwards; stroke-dashoffset: 200;"/>
  <text x="365" y="240" class="cost-label" fill="#e74c3c">cost=1</text>

  <line x1="570" y1="218" x2="460" y2="258" stroke="#888" stroke-width="2" style="stroke-dasharray: 200; animation: pathDraw 1s 0.8s forwards; stroke-dashoffset: 200;"/>
  <text x="530" y="240" class="cost-label" fill="#e74c3c">cost=1</text>

  <!-- Cross-lattice jumps -->
  <line x1="450" y1="148" x2="450" y2="258" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4" style="stroke-dasharray: 300; animation: pathDraw 1.5s 1s forwards; stroke-dashoffset: 300;"/>
  <text x="470" y="200" class="cost-label" fill="#e74c3c">G↔A cost=2</text>

  <line x1="328" y1="218" x2="572" y2="218" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4" style="stroke-dasharray: 300; animation: pathDraw 1.5s 1.2s forwards; stroke-dashoffset: 300;"/>
  <text x="450" y="212" class="cost-label" fill="#e74c3c">C↔U cost=2</text>

  <!-- Example mutation paths -->
  <text x="450" y="320" class="title" style="font-size: 16px; animation: fadeIn 1s 1.5s forwards; opacity: 0;">Example Mutation Cost Analysis</text>

  <!-- Path 1: Met (AUG) -> Ile (AUA/AUC/AUU) -->
  <g style="animation: fadeIn 1s 1.8s forwards; opacity: 0;">
    <rect x="50" y="340" width="380" height="90" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
    <text x="240" y="365" class="node-label" style="font-size: 13px; fill: #2980b9;">Met (AUG) → Ile (AUA/AUC/AUU)</text>
    <text x="240" y="385" class="path-label">Minimal path: AUG → AU&#8285; (single-pos edit)</text>
    <text x="240" y="405" class="path-label">B&#8324; cost = 1 (p&#8323;: G→A, C, or U)</text>
    <text x="240" y="422" class="cost-label" style="fill: #27ae60;">No primitive change: Met (&#208;) → Ile (&#199;)</text>
  </g>

  <!-- Path 2: Asp (GAU/GAC) -> Glu (GAA/GAG) -->
  <g style="animation: fadeIn 1s 2.2s forwards; opacity: 0;">
    <rect x="470" y="340" width="380" height="90" rx="8" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
    <text x="660" y="365" class="node-label" style="font-size: 13px; fill: #27ae60;">Asp (GAU/GAC) → Glu (GAA/GAG)</text>
    <text x="660" y="385" class="path-label">Minimal path: GAU → GAA (p&#8323;: U→A)</text>
    <text x="660" y="405" class="path-label">B&#8324; cost = 1 (single cover: U→A)</text>
    <text x="660" y="422" class="cost-label" style="fill: #e74c3c;">Primitive change: &#358; (Chirality) → &#937; (Winding)</text>
  </g>

  <!-- Path 3: Cross-stratum: GAA -> UUU -->
  <g style="animation: fadeIn 1s 2.6s forwards; opacity: 0;">
    <rect x="50" y="450" width="380" height="90" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
    <text x="240" y="475" class="node-label" style="font-size: 13px; fill: #e74c3c;">Glu (GAG/GAA) → Phe (UUU/UUC)</text>
    <text x="240" y="495" class="path-label">GAG → UUC: G→U + A→U + G→C</text>
    <text x="240" y="515" class="path-label">Total B&#8324; cost = 3 (three edits)</text>
    <text x="240" y="532" class="cost-label" style="fill: #e74c3c;">Cross-stratum: split → exact box</text>
  </g>

  <!-- Path 4: Trapped state -->
  <g style="animation: fadeIn 1s 3s forwards; opacity: 0;">
    <rect x="470" y="450" width="380" height="90" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="660" y="475" class="node-label" style="font-size: 13px; fill: #e67e22;">Chimera Trap Detection</text>
    <text x="660" y="495" class="path-label">Editing across multiple primitive classes triggers</text>
    <text x="660" y="515" class="path-label">the Chimera Theorem: tensor(&#8857;&#8331;, &#8857;&#8323;) = &#8857;&#8323;</text>
    <text x="660" y="532" class="cost-label" style="fill: #e67e22;">Composite edits are tensorial, not additive</text>
  </g>

  <!-- Risk summary -->
  <text x="450" y="585" class="title" style="font-size: 16px; animation: fadeIn 1s 3.5s forwards; opacity: 0;">Primitive Mutation Risk Classification</text>
  <g style="animation: fadeIn 1s 4s forwards; opacity: 0;">
    <rect x="50" y="600" width="800" height="80" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
    <text x="150" y="625" class="caption" style="fill: #e74c3c; font-weight: bold;">Critical risk</text>
    <text x="150" y="645" class="caption">&#208;, &#358;, &#937; — Met, Asp, Glu</text>
    <text x="350" y="625" class="caption" style="fill: #e67e22; font-weight: bold;">High risk</text>
    <text x="350" y="645" class="caption">&#344;, &#8857; — Cys, Gln</text>
    <text x="530" y="625" class="caption" style="fill: #f39c12; font-weight: bold;">Moderate risk</text>
    <text x="530" y="645" class="caption">&#254;, &#934;, &#199;, &#915;, &#610;</text>
    <text x="700" y="625" class="caption" style="fill: #28a745; font-weight: bold;">Low risk</text>
    <text x="700" y="645" class="caption">&#402;, &#931; — Phe, Lys</text>
  </g>
</svg>