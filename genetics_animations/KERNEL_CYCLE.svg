<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 630" width="900" height="630">
  <defs>
    <style>
      .title { font-family: serif; font-size: 22px; text-anchor: middle; font-weight: bold; fill: #222; }
      .caption { font-family: sans-serif; font-size: 13px; text-anchor: middle; fill: #666; }
      .op-label { font-family: monospace; font-size: 18px; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: central; }
      .reg-label { font-family: monospace; font-size: 14px; fill: #333; text-anchor: middle; }
      .theorem { font-family: serif; font-size: 15px; text-anchor: middle; fill: #444; }
      @keyframes blinkOp { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
  </defs>

  <text x="450" y="35" class="title">Paraconsistent Kernel Frobenius Cycle</text>
  <text x="450" y="60" class="caption">ENGAGR → FSPLIT → FFUSE : The genetic code's μ∘δ=id as kernel computation</text>

  <!-- Input codon registers -->
  <text x="200" y="95" class="reg-label" font-weight="bold" font-size="16">Input Codon (p&#8321;, p&#8322;, p&#8323;)</text>
  <rect x="120" y="108" width="60" height="40" rx="5" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
  <text x="150" y="133" class="reg-label" font-weight="bold">p&#8321;</text>
  <rect x="195" y="108" width="60" height="40" rx="5" fill="#d4e6f1" stroke="#2980b9" stroke-width="2"/>
  <text x="225" y="133" class="reg-label" font-weight="bold">p&#8322;</text>
  <rect x="270" y="108" width="60" height="40" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="300" y="133" class="reg-label" font-weight="bold">p&#8323;</text>

  <!-- Step 1 Arrow -->
  <line x1="330" y1="128" x2="360" y2="128" stroke="#888" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 1: ENGAGR -->
  <rect x="360" y="100" width="200" height="50" rx="25" fill="#e74c3c" stroke="#c0392b" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <text x="460" y="126" class="op-label" style="font-size: 16px;">ENGAGR</text>
  <text x="460" y="90" class="caption" style="fill: #e74c3c; font-size: 11px;">r&#8320; = p&#8321; ∧ ¬p&#8321;</text>

  <!-- Step 2 Arrow -->
  <line x1="560" y1="125" x2="590" y2="125" stroke="#888" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2: FSPLIT -->
  <rect x="590" y="95" width="100" height="60" rx="10" fill="#2980b9" stroke="#2471a3" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="640" y="120" class="op-label" style="font-size: 14px;">FSPLIT</text>
  <text x="640" y="140" class="op-label" style="font-size: 11px;">B → (T,F)</text>

  <!-- Split outputs -->
  <text x="640" y="172" class="reg-label" font-size="12" fill="#2980b9">r&#8321; = T</text>
  <text x="640" y="190" class="reg-label" font-size="12" fill="#2980b9">r&#8322; = F</text>

  <!-- Arrow down to FFUSE -->
  <path d="M 640 155 Q 640 220 560 277" fill="none" stroke="#888" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3: FFUSE -->
  <rect x="340" y="250" width="220" height="55" rx="10" fill="#27ae60" stroke="#1e8449" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="2.5s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="272" class="op-label" style="font-size: 16px;">FFUSE</text>
  <text x="450" y="293" class="op-label" style="font-size: 12px;">r&#8320; = join(r&#8321;, r&#8322;)</text>

  <!-- Arrow to result -->
  <line x1="450" y1="305" x2="450" y2="360" stroke="#888" stroke-width="2" marker-end="url(#a)"/>

  <!-- Result: Frobenius check -->
  <rect x="340" y="360" width="220" height="45" rx="22" fill="#f39c12" stroke="#d4ac0d" stroke-width="2">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="387" class="op-label" style="font-size: 15px;">r&#8320; = p&#8321;?</text>

  <!-- Results -->
  <text x="450" y="430" class="theorem" style="fill: #28a745; animation: fadeIn 1s 4s forwards; opacity: 0;">
    &#10003; Exact stratum: r&#8320; = p&#8321; holds exactly
  </text>
  <text x="450" y="455" class="theorem" style="fill: #f39c12; animation: fadeIn 1s 4.5s forwards; opacity: 0;">
    &#10003; Split stratum: r&#8320; = p&#8321; modulo &#8484;&#8322; wobble
  </text>
  <text x="450" y="480" class="theorem" style="fill: #e74c3c; animation: fadeIn 1s 5s forwards; opacity: 0;">
    &#10003; Stop codons (UAA,UAG,UGA): Ω boundary detected
  </text>

  <!-- Theorem box -->
  <rect x="100" y="510" width="700" height="65" rx="8" fill="#f8f9fa" stroke="#ddd" stroke-width="1" style="animation: fadeIn 1s 5.5s forwards; opacity: 0;"/>
  <text x="450" y="535" class="theorem" style="font-weight: bold;">Theorem: ffuse∘fsplit = id for all four Belnap values</text>
  <text x="450" y="555" class="caption">The kernel's Frobenius invariant IS the genetic code's μ∘δ=id</text>
  <text x="450" y="570" class="caption">17,280,000 / 64 = 270,000 : Crystal divides codon space exactly</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>
</svg>